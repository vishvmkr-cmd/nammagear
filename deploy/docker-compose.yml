services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: student_gear_shop
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d student_gear_shop"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://app:app@postgres:5432/student_gear_shop
      PORT: "4000"
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate deploy && node dist/index.js"
    expose:
      - "4000"

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
      args:
        API_PROXY_ORIGIN: http://api:4000
        NEXT_PUBLIC_API_URL: https://microlynk.shop/api
    environment:
      API_PROXY_ORIGIN: http://api:4000
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
